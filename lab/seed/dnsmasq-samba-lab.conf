# Samba lab specifics — fed into stage-router-artifacts.sh via --extra-dnsmasq.
# Nested under the write_files block in user-data; keep the indentation level
# of lines that will land in /etc/dnsmasq.d/lab.conf (the wrapping is handled
# by the staging script, which prefixes 6 spaces).

# MAC-based DHCP reservations for the lab's predictable-IP VMs.
# Hyper-V default MAC prefix is 00:15:5D. Pin these MACs on the VMs.
dhcp-host=00:15:5d:0a:0a:0a,WS2025-DC1,10.10.10.10,infinite
dhcp-host=00:15:5d:0a:0a:14,samba-dc1,10.10.10.20,infinite
dhcp-host=00:15:5d:0a:0a:15,samba-dc2,10.10.10.21,infinite
dhcp-host=00:15:5d:0a:0a:16,samba-dc3,10.10.10.22,infinite

# Delegate lab.test zone to the AD DCs so any LAN client that uses the
# router as DNS resolves AD records correctly. Both DCs listed — dnsmasq
# will try in order and fall back if one is down.
server=/lab.test/10.10.10.10
server=/lab.test/10.10.10.20
